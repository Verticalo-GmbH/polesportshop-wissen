# Lokale Validierungs-Grenze (§1a LLM-Architektur-Standard).
# Einmalig aktivieren:  pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: pipeline-validate
        name: pipeline validate (Schema-as-Code)
        entry: python -m pipeline.validate
        language: system
        pass_filenames: false
        always_run: true
